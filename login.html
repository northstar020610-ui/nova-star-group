<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectare — Nova-Star Group</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== Cer cu stele (animat) ===== -->
    <div class="stars" id="stars" aria-hidden="true">
        <span class="shooting"></span>
        <span class="shooting s2"></span>
    </div>

    <!-- ===== Bara de sus ===== -->
    <header class="navbar">
        <a href="index.html" class="logo">✦ Nova-Star Group</a>
        <nav class="nav-links">
            <a href="nova-play.html">Nova Play and Learn</a>
            <a href="nova-solutions.html">Asociația Nova Solutions</a>
            <a href="northstar.html">NorthStar Studio</a>
            <a href="login.html" id="auth-link" class="nav-cta">Conectare</a>
        </nav>
    </header>

    <!-- ===== Formular de conectare ===== -->
    <section class="auth">
        <div class="auth-box">
            <h1>Bine ai revenit</h1>
            <p class="sub">Conectează-te ca să descarci jocurile.</p>

            <form id="login-form">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="email@exemplu.ro" required>

                <label for="login-password">Parolă</label>
                <input type="password" id="login-password" placeholder="parola ta" required>

                <button type="submit">Conectează-te</button>
            </form>

            <div class="auth-or">sau</div>

            <button type="button" id="google-btn" class="google-btn">
                <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22 22-9.8 22-22c0-1.5-.2-2.6-.4-3.5z"/>
                    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 4.1 29.6 2 24 2 16.3 2 9.7 6.3 6.3 14.7z"/>
                    <path fill="#4CAF50" d="M24 46c5.5 0 10.5-2.1 14.2-5.6l-6.6-5.4C29.5 36.7 26.9 38 24 38c-5.2 0-9.6-3.3-11.2-8l-6.6 5.1C9.5 41.6 16.2 46 24 46z"/>
                    <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.4l6.6 5.4C41.4 35.9 44 30.5 44 24c0-1.5-.2-2.6-.4-3.5z"/>
                </svg>
                Continuă cu Google
            </button>

            <p id="login-message" class="auth-message"></p>
            <p class="auth-switch">Nu ai cont? <a href="register.html">Creează unul</a></p>
        </div>
    </section>

    <!-- ===== Scripturi ===== -->
    <script type="module" src="nova-auth.js"></script>
    <script type="module">
        import { auth } from "./firebase-config.js";
        import {
            signInWithEmailAndPassword,
            GoogleAuthProvider,
            signInWithPopup
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const form = document.getElementById("login-form");
        const message = document.getElementById("login-message");

        // ---- Conectare cu Google ----
        document.getElementById("google-btn").addEventListener("click", async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                message.style.color = "#5dcaa5";
                message.textContent = "Conectat cu Google! Te redirecționăm...";
                setTimeout(() => { window.location.href = "index.html"; }, 1000);
            } catch (err) {
                message.style.color = "#f0997b";
                message.textContent = traducereEroare(err.code);
            }
        });

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                message.style.color = "#5dcaa5";
                message.textContent = "Conectat! Te redirecționăm...";
                setTimeout(() => { window.location.href = "index.html"; }, 1200);
            } catch (err) {
                message.style.color = "#f0997b";
                message.textContent = traducereEroare(err.code);
            }
        });

        function traducereEroare(code) {
            if (code === "auth/popup-closed-by-user" || code === "auth/cancelled-popup-request")
                return "";   // ai inchis fereastra Google - nu e o eroare
            if (code === "auth/invalid-credential" || code === "auth/wrong-password" || code === "auth/user-not-found")
                return "Email sau parolă greșită.";
            if (code === "auth/invalid-email") return "Email invalid.";
            if (code === "auth/too-many-requests") return "Prea multe încercări. Mai încearcă peste un minut.";
            if (code === "auth/unauthorized-domain") return "Domeniu neautorizat în Firebase (adaugă localhost).";
            return "Eroare: " + code;
        }
    </script>

</body>
</html>
